<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네이버 로그인</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .callback-card {
      text-align: center;
      padding: 60px 40px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid #e0e0e0;
      border-top-color: #03c75a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .callback-title {
      font-size: 16px;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .callback-sub {
      font-size: 13px;
      color: #999;
    }
    .btn-link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card callback-card">

      <div id="loading">
        <div class="spinner"></div>
        <p class="callback-title">네이버 로그인 처리 중...</p>
        <p class="callback-sub">잠시만 기다려주세요</p>
      </div>

      <div id="success" style="display:none;">
        <div style="font-size:48px; margin-bottom:16px;">✅</div>
        <p class="callback-title">로그인 성공!</p>
        <p class="callback-sub">잠시 후 이동합니다...</p>
      </div>

      <div id="error" style="display:none;">
        <div style="font-size:48px; margin-bottom:16px;">❌</div>
        <p class="callback-title" id="errorMsg">오류가 발생했습니다.</p>
        <a href="index.html" class="btn-link">로그인 페이지로 돌아가기</a>
      </div>

    </div>
  </div>
  <script src="naver-callback.js"></script>
</body>
</html>
